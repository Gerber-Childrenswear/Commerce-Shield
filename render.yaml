services:
  - type: web
    name: commerce-shield
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        fromService:
          type: web
          name: commerce-shield
          property: port
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_ADMIN_API_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_SHOP_ID
        sync: false
      - key: COMMERCE_SHIELD_ADMIN_TOKEN
        sync: false
