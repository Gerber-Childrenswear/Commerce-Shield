name = "commerce-shield-prod"
main = "src/index.js"
compatibility_date = "2024-12-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[observability.traces]
enabled = false
head_sampling_rate = 1
persist = true

[vars]
SHOPIFY_APP_URL = "https://commerce-shield-prod.ncassidy.workers.dev"
SHOPIFY_ADMIN_SHOP = "gerberchildrenswear.myshopify.com"
SHOPIFY_ADMIN_API_VERSION = "2026-01"
CLOUDFLARE_MONTHLY_REQUEST_QUOTA = "10000000"
CLOUDFLARE_QUOTA_SHUTOFF_PERCENT = "95"
CLOUDFLARE_QUOTA_ALERT_PERCENTS = "90,95"
STOREFRONT_DOMAIN = "www.gerberchildrenswear.com,gerberchildrenswear.myshopify.com"

[[d1_databases]]
binding = "DB"
database_name = "commerce-shield-db"
database_id = "2f84964f-7a8e-4518-b8c3-d39d3782a5a9"
